name: Build and deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Setup Node
        uses: actions/setup-node@v2
        with:
          node-version: 24

      - name: Deps
        run: |
          npm install --global pnpm
          pnpm i

      - name: Build plugin(s)
        run: pnpm lune ci
